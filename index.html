<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>疲勞偵測系統</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:sans-serif;
}

video{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:fixed;
    width:100%;
    top:0;
    left:0;
    text-align:center;
    color:white;
}

h1{
    color:cyan;
    font-size:60px;
    margin-top:80px;
    text-shadow:0 0 20px cyan;
}

#status{
    font-size:35px;
    margin-top:20px;
}

button{
    position:fixed;
    bottom:100px;
    left:50%;
    transform:translateX(-50%);
    padding:20px 50px;
    font-size:30px;
    border:none;
    border-radius:20px;
    background:red;
    color:white;
}

.flash{
    animation:flash 0.5s infinite;
}

@keyframes flash{
    0%{background:red;}
    50%{background:black;}
    100%{background:red;}
}

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div class="overlay">

<h1>疲勞偵測系統</h1>

<div id="status">等待開始</div>

<button onclick="startSystem()">開始偵測</button>

</div>

<audio id="alarm" src="alarm.mp3"></audio>

<script>

const video = document.getElementById("video");
const statusText = document.getElementById("status");
const alarm = document.getElementById("alarm");

let calibratedEAR = 0;
let calibrationCount = 0;
let calibrationTotal = 0;

let eyeCloseStart = null;

function getDistance(a,b){

    return Math.sqrt(
        (a.x-b.x)**2 +
        (a.y-b.y)**2
    );

}

function calculateEAR(landmarks){

    const leftTop = landmarks[159];
    const leftBottom = landmarks[145];

    const leftLeft = landmarks[33];
    const leftRight = landmarks[133];

    const eyeHeight = getDistance(leftTop,leftBottom);
    const eyeWidth = getDistance(leftLeft,leftRight);

    return eyeHeight / eyeWidth;

}

async function startSystem(){

    const stream = await navigator.mediaDevices.getUserMedia({
        video:{
            facingMode:"user"
        }
    });

    video.srcObject = stream;

    statusText.innerHTML="校正中...請保持正常睜眼";

    const faceMesh = new FaceMesh({
        locateFile:(file)=>{
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }
    });

    faceMesh.setOptions({
        maxNumFaces:1,
        refineLandmarks:true,
        minDetectionConfidence:0.5,
        minTrackingConfidence:0.5
    });

    faceMesh.onResults(results=>{

        if(!results.multiFaceLandmarks) return;

        const landmarks = results.multiFaceLandmarks[0];

        const ear = calculateEAR(landmarks);

        if(calibrationCount < 60){

            calibrationTotal += ear;
            calibrationCount++;

            calibratedEAR = calibrationTotal / calibrationCount;

            statusText.innerHTML="個人化校正中...";

            return;

        }

        const threshold = calibratedEAR * 0.55;

        if(ear < threshold){

            if(!eyeCloseStart){

                eyeCloseStart = Date.now();

            }

            const sec =
            (Date.now()-eyeCloseStart)/1000;

            if(sec >=3 && sec <5){

                statusText.innerHTML="⚠️ 第一階段警告";

            }

            else if(sec >=5 && sec <8){

                statusText.innerHTML="🚨 第二階段警告";

                document.body.classList.add("flash");

                alarm.play();

                speak("請注意駕駛");

            }

            else if(sec >=8){

                statusText.innerHTML="🛑 危險狀態";

                window.location.href=
                "https://www.google.com/maps/search/最近休息站";

            }

        }else{

            eyeCloseStart = null;

            document.body.classList.remove("flash");

            statusText.innerHTML="狀態正常";

        }

        // 哈欠偵測

        const mouthTop = landmarks[13];
        const mouthBottom = landmarks[14];

        const mouthOpen =
        getDistance(mouthTop,mouthBottom);

        if(mouthOpen > 0.06){

            statusText.innerHTML="🥱 偵測到哈欠";

            alarm.play();

        }

    });

    const camera = new Camera(video,{
        onFrame: async()=>{
            await faceMesh.send({image:video});
        },
        width:640,
        height:480
    });

    camera.start();

}

function speak(text){

    const speech =
    new SpeechSynthesisUtterance(text);

    speech.lang="zh-TW";

    speechSynthesis.speak(speech);

}

</script>

</body>
</html>
