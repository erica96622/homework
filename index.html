<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>疲勞偵測系統</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:sans-serif;
}

#container{
    position:relative;
    width:100vw;
    height:100vh;
}

video{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
}

canvas{
    position:absolute;
    width:100%;
    height:100%;
}

#title{
    position:absolute;
    top:30px;
    width:100%;
    text-align:center;
    color:cyan;
    font-size:50px;
    font-weight:bold;
    text-shadow:0 0 20px cyan;
    z-index:10;
}

#status{
    position:absolute;
    top:110px;
    width:100%;
    text-align:center;
    color:white;
    font-size:32px;
    z-index:10;
}

#warning{
    position:absolute;
    bottom:120px;
    width:100%;
    text-align:center;
    font-size:38px;
    font-weight:bold;
    z-index:10;
}

#startBtn{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    padding:20px 50px;
    border:none;
    border-radius:20px;
    background:cyan;
    color:black;
    font-size:28px;
    font-weight:bold;
    z-index:20;
}

#flash{
    position:absolute;
    width:100%;
    height:100%;
    background:red;
    opacity:0;
    pointer-events:none;
    z-index:5;
}

.flashActive{
    animation:flashAnim 0.5s infinite;
}

@keyframes flashAnim{
    0%{opacity:0;}
    50%{opacity:0.45;}
    100%{opacity:0;}
}

</style>
</head>

<body>

<div id="container">

<div id="flash"></div>

<video id="video" autoplay playsinline muted></video>

<canvas id="canvas"></canvas>

<div id="title">
疲勞偵測系統
</div>

<div id="status">
等待開始
</div>

<div id="warning"></div>

<button id="startBtn">
開始偵測
</button>

<audio id="alarm" src="alarm.mp3"></audio>

</div>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const statusText = document.getElementById("status");
const warningText = document.getElementById("warning");

const flash = document.getElementById("flash");

const alarm = document.getElementById("alarm");

const startBtn = document.getElementById("startBtn");

let personalEAR = 0;

let calibrationFrames = [];

let calibrating = true;

let eyeClosedStart = null;

let lastYawnTime = 0;

let stage1 = false;
let stage2 = false;
let stage3 = false;

function distance(a,b){

    return Math.hypot(
        a.x-b.x,
        a.y-b.y
    );
}

function calculateEAR(landmarks){

    const top = landmarks[159];
    const bottom = landmarks[145];

    const left = landmarks[33];
    const right = landmarks[133];

    const eyeHeight =
    distance(top,bottom);

    const eyeWidth =
    distance(left,right);

    return eyeHeight / eyeWidth;
}

function calculateMAR(landmarks){

    const top = landmarks[13];
    const bottom = landmarks[14];

    return distance(top,bottom);
}

function speak(text){

    const msg =
    new SpeechSynthesisUtterance(text);

    msg.lang = "zh-TW";

    speechSynthesis.speak(msg);
}

function playAlarm(){

    alarm.currentTime = 0;

    alarm.play();
}

function resetStages(){

    stage1 = false;
    stage2 = false;
    stage3 = false;
}

function triggerStage(level){

    if(level === 1 && !stage1){

        warningText.innerHTML =
        "⚠️ 第一階段警告";

        warningText.style.color =
        "yellow";

        speak("請注意精神狀態");

        stage1 = true;
    }

    if(level === 2 && !stage2){

        warningText.innerHTML =
        "🚨 第二階段警告";

        warningText.style.color =
        "orange";

        flash.classList.add(
            "flashActive"
        );

        playAlarm();

        speak("請立即保持清醒");

        stage2 = true;
    }

    if(level === 3 && !stage3){

        warningText.innerHTML =
        "🛑 第三階段危險";

        warningText.style.color =
        "red";

        flash.classList.add(
            "flashActive"
        );

        playAlarm();

        speak("危險，立即前往休息區");

        stage3 = true;

        setTimeout(()=>{

            window.open(
            "https://www.google.com/maps/search/國道服務區",
            "_blank"
            );

        },3000);
    }
}

startBtn.onclick = async ()=>{

    startBtn.style.display =
    "none";

    statusText.innerHTML =
    "啟動攝影機中...";

    try{

        const stream =
        await navigator.mediaDevices.getUserMedia({

            video:{
                facingMode:{
                    ideal:"user"
                }
            },

            audio:false
        });

        video.srcObject = stream;

        const faceMesh =
        new FaceMesh({

            locateFile:(file)=>{
                return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
            }
        });

        faceMesh.setOptions({

            maxNumFaces:1,

            refineLandmarks:true,

            minDetectionConfidence:0.5,

            minTrackingConfidence:0.5
        });

        faceMesh.onResults(onResults);

        const camera =
        new Camera(video,{

            onFrame:async ()=>{

                await faceMesh.send({
                    image:video
                });
            },

            width:640,
            height:480
        });

        camera.start();

    }catch(error){

        statusText.innerHTML =
        "無法開啟攝影機";

        console.log(error);
    }
};

function onResults(results){

    canvas.width =
    video.videoWidth;

    canvas.height =
    video.videoHeight;

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    if(!results.multiFaceLandmarks){

        statusText.innerHTML =
        "未偵測到人臉";

        return;
    }

    const landmarks =
    results.multiFaceLandmarks[0];

    const ear =
    calculateEAR(landmarks);

    const mar =
    calculateMAR(landmarks);

    // 畫眼睛框線

    ctx.strokeStyle = "cyan";
    ctx.lineWidth = 3;

    const eyePoints = [33,133,159,145];

    ctx.beginPath();

    eyePoints.forEach((i,index)=>{

        const x =
        landmarks[i].x * canvas.width;

        const y =
        landmarks[i].y * canvas.height;

        if(index===0){

            ctx.moveTo(x,y);

        }else{

            ctx.lineTo(x,y);
        }

    });

    ctx.closePath();
    ctx.stroke();

    // 畫嘴巴框線

    ctx.strokeStyle = "yellow";

    const mouthPoints = [61,291,13,14];

    ctx.beginPath();

    mouthPoints.forEach((i,index)=>{

        const x =
        landmarks[i].x * canvas.width;

        const y =
        landmarks[i].y * canvas.height;

        if(index===0){

            ctx.moveTo(x,y);

        }else{

            ctx.lineTo(x,y);
        }

    });

    ctx.closePath();
    ctx.stroke();

    if(calibrating){

        calibrationFrames.push(ear);

        statusText.innerHTML =
        "校正中...請保持正常睜眼";

        statusText.style.color =
        "cyan";

        if(calibrationFrames.length > 150){

            personalEAR =
            calibrationFrames.reduce(
                (a,b)=>a+b,0
            ) / calibrationFrames.length;

            calibrating = false;

            statusText.innerHTML =
            "校正完成";

            statusText.style.color =
            "lime";

            speak("校正完成");
        }

        return;
    }

    if(ear < personalEAR * 0.7){

        if(!eyeClosedStart){

            eyeClosedStart =
            Date.now();

            resetStages();
        }

        let closedTime =
        (Date.now() - eyeClosedStart)
        / 1000;

        statusText.innerHTML =
        "閉眼中 " +
        closedTime.toFixed(1) +
        " 秒";

        statusText.style.color =
        "red";

        if(closedTime >= 3){

            triggerStage(1);
        }

        if(closedTime >= 5){

            triggerStage(2);
        }

        if(closedTime >= 8){

            triggerStage(3);
        }

    }else{

        eyeClosedStart = null;

        flash.classList.remove(
            "flashActive"
        );

        warningText.innerHTML = "";

        statusText.innerHTML =
        "狀態正常";

        statusText.style.color =
        "lime";
    }

    if(mar > 0.06){

        if(Date.now() - lastYawnTime > 4000){

            statusText.innerHTML =
            "🥱 偵測到打哈欠";

            statusText.style.color =
            "orange";

            playAlarm();

            speak("偵測到打哈欠");

            lastYawnTime =
            Date.now();
        }
    }
}

</script>

</body>
</html>
