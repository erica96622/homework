<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>疲勞偵測系統</title>

<style>

body{
    margin:0;
    background:black;
    color:white;
    font-family:sans-serif;
    text-align:center;
    overflow:hidden;
}

video{
    width:100vw;
    height:100vh;
    object-fit:cover;
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.2);
}

h1{
    margin-top:60px;
    font-size:60px;
    color:cyan;
    text-shadow:0 0 20px cyan;
}

#status{
    font-size:40px;
    margin-top:30px;
    font-weight:bold;
}

button{
    margin-top:40px;
    padding:20px 50px;
    font-size:30px;
    border:none;
    border-radius:20px;
    background:red;
    color:white;
}

.flash{
    animation:flash 0.5s infinite;
}

@keyframes flash{
    0%{background:red;}
    50%{background:black;}
    100%{background:red;}
}

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div class="overlay">

<h1>疲勞偵測系統</h1>

<div id="status">等待開始</div>

<button onclick="startSystem()">開始偵測</button>

</div>

<audio id="alarm" src="alarm.mp3"></audio>

<script>

const video = document.getElementById("video");
const statusText = document.getElementById("status");
const alarm = document.getElementById("alarm");

let eyeClosed = false;
let closeStart = 0;

async function startSystem(){

    statusText.innerHTML="啟動攝影機中...";

    try{

        const stream = await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:"user"
            },
            audio:false
        });

        video.srcObject = stream;

        statusText.innerHTML="校正中...";

        setTimeout(()=>{
            statusText.innerHTML="狀態正常";
            startDetect();
        },3000);

    }catch(err){

        statusText.innerHTML="攝影機權限失敗";

    }

}

function startDetect(){

    setInterval(()=>{

        if(eyeClosed){

            let sec = (Date.now()-closeStart)/1000;

            if(sec>=3 && sec<5){

                statusText.innerHTML="⚠️ 第一階段警告";

            }

            else if(sec>=5 && sec<8){

                statusText.innerHTML="🚨 第二階段警告";

                document.body.classList.add("flash");

                alarm.play();

                speak("請注意駕駛");

            }

            else if(sec>=8){

                statusText.innerHTML="🛑 已進入危險狀態";

                window.location.href=
                "https://www.google.com/maps/search/最近休息站";

            }

        }else{

            document.body.classList.remove("flash");

            statusText.innerHTML="狀態正常";

        }

    },500);

}

function speak(text){

    const speech = new SpeechSynthesisUtterance(text);

    speech.lang="zh-TW";

    speechSynthesis.speak(speech);

}

document.addEventListener("touchstart",()=>{

    if(!eyeClosed){

        eyeClosed=true;
        closeStart=Date.now();

    }else{

        eyeClosed=false;

    }

});

</script>

</body>
</html>
