<!DOCTYPE html>
<html lang="zh-TW">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>疲勞偵測系統</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

<style>

body{
    margin:0;
    background:#050505;
    color:white;
    font-family:sans-serif;
    overflow:hidden;
}

#container{
    position:relative;
    width:100vw;
    height:100vh;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
}

canvas{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

#title{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:42px;
    font-weight:bold;
    color:cyan;
    text-shadow:0 0 20px cyan;
    z-index:10;
}

#status{
    position:absolute;
    top:90px;
    width:100%;
    text-align:center;
    font-size:28px;
    z-index:10;
}

#level{
    position:absolute;
    bottom:50px;
    width:100%;
    text-align:center;
    font-size:35px;
    font-weight:bold;
    z-index:10;
}

#flash{
    position:absolute;
    width:100%;
    height:100%;
    background:red;
    opacity:0;
    pointer-events:none;
}

.flashActive{
    animation:flashAnim 0.5s infinite;
}

@keyframes flashAnim{
    0%{opacity:0;}
    50%{opacity:0.5;}
    100%{opacity:0;}
}

#startBtn{
    position:absolute;
    bottom:140px;
    left:50%;
    transform:translateX(-50%);
    padding:18px 40px;
    font-size:25px;
    border:none;
    border-radius:20px;
    background:cyan;
    color:black;
    font-weight:bold;
    z-index:20;
}

</style>
</head>

<body>

<div id="container">

<div id="flash"></div>

<div id="title">
疲勞偵測系統
</div>

<div id="status">
等待開始
</div>

<div id="level"></div>

<button id="startBtn">
開始偵測
</button>

<video id="video" autoplay playsinline muted></video>

<canvas id="canvas"></canvas>

<audio id="alarm" src="alarm.mp3"></audio>

</div>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const statusText = document.getElementById("status");
const levelText = document.getElementById("level");

const flash = document.getElementById("flash");

const alarm = document.getElementById("alarm");

const startBtn = document.getElementById("startBtn");

let personalEAR = 0;

let calibrationFrames = [];

let calibrating = true;

let eyeClosedStart = null;

let lastYawningTime = 0;

let stage1Played = false;
let stage2Played = false;
let stage3Played = false;

function distance(a,b){

    return Math.hypot(
        a.x-b.x,
        a.y-b.y
    );
}

function calculateEAR(landmarks){

    const leftTop = landmarks[159];
    const leftBottom = landmarks[145];

    const leftLeft = landmarks[33];
    const leftRight = landmarks[133];

    const eyeHeight =
    distance(leftTop,leftBottom);

    const eyeWidth =
    distance(leftLeft,leftRight);

    return eyeHeight / eyeWidth;
}

function calculateMAR(landmarks){

    const top = landmarks[13];
    const bottom = landmarks[14];

    return distance(top,bottom);
}

function speak(text){

    const msg =
    new SpeechSynthesisUtterance(text);

    msg.lang = "zh-TW";

    speechSynthesis.speak(msg);
}

function warningLevel(level){

    if(level === 1 && !stage1Played){

        levelText.innerHTML =
        "⚠️ 第一階段警告";

        levelText.style.color = "yellow";

        statusText.innerHTML =
        "請注意精神狀態";

        speak("請注意精神狀態");

        stage1Played = true;
    }

    if(level === 2 && !stage2Played){

        levelText.innerHTML =
        "🚨 第二階段警告";

        levelText.style.color = "orange";

        flash.classList.add("flashActive");

        alarm.play();

        speak("請立即保持清醒");

        stage2Played = true;
    }

    if(level === 3 && !stage3Played){

        levelText.innerHTML =
        "🛑 第三階段危險";

        levelText.style.color = "red";

        flash.classList.add("flashActive");

        alarm.play();

        speak("危險，立即前往休息區");

        stage3Played = true;

        setTimeout(()=>{

            window.location.href =
            "https://www.google.com/maps/search/最近休息站";

        },3000);
    }
}

startBtn.onclick = async ()=>{

    startBtn.style.display = "none";

    const stream =
    await navigator.mediaDevices.getUserMedia({
        video:{
            facingMode:"user"
        },
        audio:false
    });

    video.srcObject = stream;

    const faceMesh = new FaceMesh({

        locateFile:(file)=>{

            return
            `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }
    });

    faceMesh.setOptions({

        maxNumFaces:1,

        refineLandmarks:true,

        minDetectionConfidence:0.5,

        minTrackingConfidence:0.5
    });

    faceMesh.onResults(onResults);

    const camera = new Camera(video,{

        onFrame:async ()=>{

            await faceMesh.send({
                image:video
            });
        },

        width:640,
        height:480
    });

    camera.start();
};

function onResults(results){

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    if(!results.multiFaceLandmarks) return;

    const landmarks =
    results.multiFaceLandmarks[0];

    const ear =
    calculateEAR(landmarks);

    const mar =
    calculateMAR(landmarks);

    if(calibrating){

        calibrationFrames.push(ear);

        statusText.innerHTML =
        "校正中...請保持正常睜眼";

        statusText.style.color = "cyan";

        if(calibrationFrames.length > 150){

            personalEAR =
            calibrationFrames.reduce((a,b)=>a+b,0)
            / calibrationFrames.length;

            calibrating = false;

            statusText.innerHTML =
            "校正完成";

            statusText.style.color = "lime";

            speak("校正完成");
        }

        return;
    }

    if(ear < personalEAR * 0.7){

        if(!eyeClosedStart){

            eyeClosedStart = Date.now();

            stage1Played = false;
            stage2Played = false;
            stage3Played = false;
        }

        let closedTime =
        (Date.now()-eyeClosedStart)/1000;

        statusText.innerHTML =
        "閉眼中 " +
        closedTime.toFixed(1) +
        " 秒";

        statusText.style.color = "red";

        if(closedTime > 3){

            warningLevel(1);
        }

        if(closedTime > 5){

            warningLevel(2);
        }

        if(closedTime > 8){

            warningLevel(3);
        }

    }else{

        eyeClosedStart = null;

        statusText.innerHTML =
        "狀態正常";

        statusText.style.color = "lime";

        flash.classList.remove("flashActive");

        levelText.innerHTML = "";
    }

    if(mar > 0.06){

        if(Date.now()-lastYawningTime > 4000){

            statusText.innerHTML =
            "🥱 偵測到打哈欠";

            statusText.style.color = "orange";

            alarm.play();

            speak("偵測到打哈欠");

            lastYawningTime = Date.now();
        }
    }
}

</script>

</body>
</html>
